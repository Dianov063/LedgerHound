<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Quick scam report | LedgerHound</title>
  <style>
    :root {
      --ink: #0f172a;
      --muted: #64748b;
      --line: #dbe3ee;
      --surface: #ffffff;
      --page: #f4f7fb;
      --blue: #1677e8;
      --blue-dark: #0d5fc4;
      --blue-soft: #eaf4ff;
      --green: #087f5b;
      --green-soft: #e9f8f1;
      --amber: #a65a00;
      --amber-soft: #fff5df;
      --coral: #c2413b;
      --coral-soft: #fff0ee;
      --focus: 0 0 0 3px rgba(22, 119, 232, .2);
      color-scheme: light;
    }

    * { box-sizing: border-box; }

    html { min-width: 320px; background: var(--page); }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: var(--page);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button, input, select, textarea { font: inherit; letter-spacing: 0; }
    button, select { cursor: pointer; }
    button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
      outline: none;
      box-shadow: var(--focus);
    }

    .topbar {
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px max(18px, calc((100vw - 980px) / 2));
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.96);
    }

    .brand { display: inline-flex; align-items: center; gap: 10px; min-width: 0; }
    .brand-mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 7px;
      color: #fff;
      background: var(--blue);
      font-size: 12px;
      font-weight: 900;
    }
    .brand-name { font-weight: 850; white-space: nowrap; }
    .brand-name span { color: var(--blue); }

    .language {
      width: auto;
      min-width: 132px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 9px 32px 9px 11px;
      background: #fff;
      color: var(--ink);
      font-size: 14px;
      font-weight: 700;
    }

    main {
      width: min(100% - 28px, 720px);
      margin: 0 auto;
      padding: 32px 0 44px;
    }

    .trail {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      align-items: center;
      gap: 5px;
      margin: 0 6px 18px;
    }
    .trail-step {
      height: 7px;
      border-radius: 2px;
      background: #d7e0eb;
      transition: background .2s ease, transform .2s ease;
    }
    .trail-step.done { background: var(--green); }
    .trail-step.current { background: var(--blue); transform: scaleY(1.5); }

    .case-panel {
      min-height: 560px;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 14px 40px rgba(27, 48, 78, .1);
      overflow: hidden;
    }

    .case-strip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 20px;
      background: var(--ink);
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }
    .case-strip span:last-child { color: #9cc8ff; }

    .screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 30px clamp(20px, 6vw, 44px) 24px;
      animation: enter .22s ease;
    }
    @keyframes enter {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .step-kicker {
      margin: 0 0 8px;
      color: var(--blue-dark);
      font-size: 12px;
      font-weight: 850;
      text-transform: uppercase;
    }
    h1, h2 {
      margin: 0;
      max-width: 620px;
      font-size: clamp(26px, 5vw, 34px);
      line-height: 1.12;
      letter-spacing: 0;
    }
    .lead {
      margin: 12px 0 0;
      max-width: 590px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.55;
    }

    .answer {
      margin-top: 28px;
      flex: 1;
    }
    .field-label {
      display: block;
      margin-bottom: 8px;
      color: #334155;
      font-size: 14px;
      font-weight: 800;
    }
    .field, .text-area {
      width: 100%;
      border: 1px solid #cbd7e5;
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      transition: border-color .15s ease, box-shadow .15s ease;
    }
    .field { min-height: 52px; padding: 12px 14px; }
    .text-area { min-height: 170px; resize: vertical; padding: 14px; line-height: 1.5; }
    .field:hover, .text-area:hover { border-color: #9ab1c9; }

    .choices {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .choice {
      min-height: 62px;
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: #334155;
      text-align: left;
      font-weight: 750;
    }
    .choice:hover { border-color: #85b9ef; background: #f8fbff; }
    .choice.selected { border-color: var(--blue); background: var(--blue-soft); color: #064f9e; }
    .choice-marker {
      width: 22px;
      height: 22px;
      flex: 0 0 22px;
      display: grid;
      place-items: center;
      border: 1px solid #b9c7d7;
      border-radius: 50%;
      color: transparent;
      font-size: 12px;
      font-weight: 900;
    }
    .choice.selected .choice-marker { border-color: var(--blue); background: var(--blue); color: #fff; }

    .other-field { margin-top: 14px; }
    .counter-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .counter-row strong.ready { color: var(--green); }

    .error {
      min-height: 22px;
      margin-top: 14px;
      color: var(--coral);
      font-size: 13px;
      font-weight: 750;
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 18px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
    }
    .button {
      min-height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 7px;
      padding: 11px 18px;
      border: 1px solid transparent;
      font-weight: 850;
    }
    .button-primary { background: var(--blue); color: #fff; }
    .button-primary:hover { background: var(--blue-dark); }
    .button-secondary { border-color: var(--line); background: #fff; color: #475569; }
    .button-secondary:hover { border-color: #aebed1; color: var(--ink); }
    .button-quiet { background: transparent; color: var(--muted); }

    .status-note {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-top: 16px;
      padding: 12px 14px;
      border: 1px solid #bce8d7;
      border-radius: 7px;
      background: var(--green-soft);
      color: #075f45;
      font-size: 13px;
      line-height: 1.45;
    }
    .status-mark {
      width: 20px;
      height: 20px;
      flex: 0 0 20px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: var(--green);
      color: #fff;
      font-size: 11px;
      font-weight: 900;
    }

    .review-grid { display: grid; gap: 9px; }
    .review-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #f8fafc;
    }
    .review-label { color: var(--muted); font-size: 12px; font-weight: 800; text-transform: uppercase; }
    .review-value { margin-top: 3px; overflow-wrap: anywhere; font-size: 14px; font-weight: 750; }
    .edit {
      border: 0;
      background: transparent;
      color: var(--blue-dark);
      font-size: 13px;
      font-weight: 850;
    }

    .resume-box {
      margin-top: 26px;
      padding: 18px;
      border: 1px solid #f1cf8f;
      border-radius: 7px;
      background: var(--amber-soft);
      color: #754100;
    }
    .resume-box strong { display: block; margin-bottom: 5px; }
    .resume-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }

    .footer-note {
      margin: 16px 4px 0;
      color: #6b7e94;
      text-align: center;
      font-size: 12px;
      line-height: 1.45;
    }

    [hidden] { display: none !important; }

    @media (max-width: 620px) {
      .topbar { min-height: 58px; padding: 9px 14px; }
      .brand-name { font-size: 15px; }
      .language { min-width: 112px; max-width: 130px; }
      main { width: min(100% - 18px, 720px); padding-top: 18px; }
      .case-panel { min-height: calc(100vh - 118px); }
      .case-strip { padding: 11px 15px; }
      .screen { padding: 24px 18px 18px; }
      .choices { grid-template-columns: 1fr; }
      .actions { align-items: stretch; }
      .button { flex: 1; }
      .button-quiet { flex: 0 0 auto; padding-inline: 8px; }
      .review-item { grid-template-columns: minmax(0, 1fr) auto; }
    }

    [dir="rtl"] .choice, [dir="rtl"] .review-item { text-align: right; }
  </style>
</head>

      const categoryValues = ["non_delivery_goods", "fake_service", "deposit_advance_fee", "rental_scam", "ticket_scam", "marketplace_scam", "employment_scam", "other"];
      const rails = [

      ];
      const channels = [
        ["facebook_marketplace", "Facebook Marketplace"], ["instagram", "Instagram"], ["tiktok", "TikTok"],
        ["craigslist", "Craigslist"], ["offerup", "OfferUp"], ["nextdoor", "Nextdoor"],
        ["telegram", "Telegram"], ["discord", "Discord"], ["direct_website", "website"],
        ["text_message", "textMessage"], ["other", "other"]
      ];
      const countryCodes = ("AD AE AF AG AI AL AM AO AQ AR AS AT AU AW AX AZ BA BB BD BE BF BG BH BI BJ BL BM BN BO BQ BR BS BT BV BW BY BZ CA CC CD CF CG CH CI CK CL CM CN CO CR CU CV CW CX CY CZ DE DJ DK DM DO DZ EC EE EG EH ER ES ET FI FJ FK FM FO FR GA GB GD GE GF GG GH GI GL GM GN GP GQ GR GS GT GU GW GY HK HM HN HR HT HU ID IE IL IM IN IO IQ IR IS IT JE JM JO JP KE KG KH KI KM KN KP KR KW KY KZ LA LB LC LI LK LR LS LT LU LV LY MA MC MD ME MF MG MH MK ML MM MN MO MP MQ MR MS MT MU MV MW MX MY MZ NA NC NE NF NG NI NL NO NP NR NU NZ OM PA PE PF PG PH PK PL PM PN PR PS PT PW PY QA RE RO RS RU RW SA SB SC SD SE SG SH SI SJ SK SL SM SN SO SR SS ST SV SX SY SZ TC TD TF TG TH TJ TK TL TM TN TO TR TT TV TW TZ UA UG UM US UY UZ VA VC VE VG VI VN VU WF WS YE YT ZA ZM ZW").split(" ");
      const localeToCommunityLanguage = { en: "english", ru: "russian", es: "spanish", zh: "chinese", fr: "french", ar: "arabic" };

      const screen = document.getElementById("screen");
      const trail = document.getElementById("trail");
      const languageSelect = document.getElementById("ui-language");
      const caseLabel = document.getElementById("case-label");
      const progressLabel = document.getElementById("progress-label");
      const footerNote = document.getElementById("footer-note");

      let locale = detectLocale();
      let current = 0;
      let fields = {
        country: "", category: "", categoryDetails: "", itemOrService: "", rail: "",
        paymentMethodDetails: "", paymentIdentifier: "", saleChannel: "", saleChannelDetails: "",
        description: "", reporterEmail: "", communityLanguage: localeToCommunityLanguage[locale], currency: "USD"
      };

      function detectLocale() {
        const candidate = (navigator.language || "en").toLowerCase().split("-")[0];
        return SUPPORTED_LOCALES.includes(candidate) ? candidate : "en";
      }

      function t(key, vars = {}) {
        let value = (copy[locale] && copy[locale][key]) || copy.en[key] || key;
        Object.keys(vars).forEach((name) => { value = String(value).replaceAll(`{${name}}`, String(vars[name])); });
        return value;
      }

      function esc(value) {
        return String(value ?? "").replace(/[&<>"']/g, (character) => ({
          "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
        })[character]);
      }

      function loadDraft() {
        try {
          const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
          if (saved && saved.fields && typeof saved.fields === "object") {
            fields = { ...fields, ...saved.fields };
            current = Math.min(Math.max(Number(saved.current) || 0, 0), TOTAL_STEPS - 1);
            return true;
          }
        } catch (_) {
          localStorage.removeItem(STORAGE_KEY);
        }
        return false;
      }

      function saveDraft() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ fields, current, updatedAt: new Date().toISOString() }));
      }

      function clearDraft() {
        localStorage.removeItem(STORAGE_KEY);
        current = 0;
        fields = {
          country: "", category: "", categoryDetails: "", itemOrService: "", rail: "",
          paymentMethodDetails: "", paymentIdentifier: "", saleChannel: "", saleChannelDetails: "",
          description: "", reporterEmail: "", communityLanguage: localeToCommunityLanguage[locale], currency: "USD"
        };
      }

      function updateChrome() {
        document.documentElement.lang = locale;
        document.documentElement.dir = locale === "ar" ? "rtl" : "ltr";
        languageSelect.value = locale;
        caseLabel.textContent = t("caseLabel");
        progressLabel.textContent = t("step", { current: current + 1, total: TOTAL_STEPS });
        footerNote.textContent = t("privacy");
        trail.innerHTML = Array.from({ length: TOTAL_STEPS }, (_, index) =>
          `<span class="trail-step ${index < current ? "done" : ""} ${index === current ? "current" : ""}"></span>`
        ).join("");
      }

      function countryOptions() {
        const names = new Intl.DisplayNames([locale, "en"], { type: "region" });
        return countryCodes
          .map((code) => ({ code, label: names.of(code) || code }))
          .sort((a, b) => a.label.localeCompare(b.label, locale))
          .map(({ code, label }) => `<option value="${code}" ${fields.country === code ? "selected" : ""}>${esc(label)} (${code})</option>`)
          .join("");
      }

      function choiceGrid(values, selected, labels) {
        return `<div class="choices">${values.map((value, index) => `
          <button type="button" class="choice ${selected === value ? "selected" : ""}" data-choice="${esc(value)}">
            <span class="choice-marker">✓</span><span>${esc(labels[index])}</span>
          </button>`).join("")}</div>`;
      }

      function stepShell(kicker, title, text, answer, options = {}) {
        screen.innerHTML = `
          <p class="step-kicker">${esc(kicker)}</p>
          <h2>${esc(title)}</h2>
          <p class="lead">${esc(text)}</p>
          <div class="answer">${answer}</div>
          <div id="error" class="error" role="alert"></div>
          <div class="actions">
            <button type="button" class="button button-quiet" id="back" ${current === 0 ? "hidden" : ""}>${esc(t("back"))}</button>
            <button type="button" class="button button-primary" id="next">${esc(options.final ? t("reviewButton") : t("next"))}</button>
          </div>
          <div class="status-note"><span class="status-mark">✓</span><span>${esc(t("saved"))}</span></div>`;
        document.getElementById("back")?.addEventListener("click", () => go(-1));
        document.getElementById("next")?.addEventListener("click", () => options.final ? finish() : go(1));
        bindInputs();
      }

      function render() {
        updateChrome();
        const kicker = t("step", { current: current + 1, total: TOTAL_STEPS });
        if (current === 0) {
          stepShell(kicker, t("countryTitle"), t("countryText"), `
            <label class="field-label" for="country">${esc(t("countryLabel"))}</label>
            <select id="country" class="field" data-field="country">
              <option value="">${esc(t("chooseCountry"))}</option>${countryOptions()}
              <option value="OTHER" ${fields.country === "OTHER" ? "selected" : ""}>${esc(t("other"))}</option>
            </select>`);
        } else if (current === 1) {
          stepShell(kicker, t("categoryTitle"), t("categoryText"), `
            ${choiceGrid(categoryValues, fields.category, t("categories"))}
            <div class="other-field" ${fields.category === "other" ? "" : "hidden"}>
              <input class="field" data-field="categoryDetails" value="${esc(fields.categoryDetails)}" placeholder="${esc(t("otherDetails"))}" maxlength="120">
            </div>`);
        } else if (current === 2) {
          stepShell(kicker, t("itemTitle"), t("itemText"), `
            <label class="field-label" for="item">${esc(t("itemLabel"))}</label>
            <input id="item" class="field" data-field="itemOrService" value="${esc(fields.itemOrService)}" placeholder="${esc(t("itemPlaceholder"))}" maxlength="120">`);
        } else if (current === 3) {
          stepShell(kicker, t("railTitle"), t("railText"), `
            <label class="field-label" for="rail">${esc(t("railLabel"))}</label>
            <select id="rail" class="field" data-field="rail">
              <option value="">${esc(t("chooseRail"))}</option>
              ${rails.map(([value, label]) => `<option value="${value}" ${fields.rail === value ? "selected" : ""}>${esc(copy.en[label] ? t(label) : label)}</option>`).join("")}
            </select>
            <div class="other-field" ${fields.rail === "other" ? "" : "hidden"}>
              <input class="field" data-field="paymentMethodDetails" value="${esc(fields.paymentMethodDetails)}" placeholder="${esc(t("railOther"))}" maxlength="120">
            </div>`);
        } else if (current === 4) {
          stepShell(kicker, t("recipientTitle"), t("recipientText"), `
            <label class="field-label" for="recipient">${esc(t("recipientLabel"))}</label>
            <input id="recipient" class="field" data-field="paymentIdentifier" value="${esc(fields.paymentIdentifier)}" placeholder="${esc(t("recipientPlaceholder"))}" maxlength="320">`);
        } else if (current === 5) {
          const labels = channels.map(([, label]) => copy.en[label] ? t(label) : label);
          stepShell(kicker, t("channelTitle"), t("channelText"), `
            ${choiceGrid(channels.map(([value]) => value), fields.saleChannel, labels)}
            <div class="other-field" ${fields.saleChannel === "other" ? "" : "hidden"}>
              <input class="field" data-field="saleChannelDetails" value="${esc(fields.saleChannelDetails)}" placeholder="${esc(t("channelOther"))}" maxlength="120">
            </div>`);
        } else if (current === 6) {
          const count = fields.description.trim().length;
          stepShell(kicker, t("storyTitle"), t("storyText"), `
            <label class="field-label" for="story">${esc(t("storyLabel"))}</label>
            <textarea id="story" class="text-area" data-field="description" placeholder="${esc(t("storyPlaceholder"))}" maxlength="3000">${esc(fields.description)}</textarea>
            <div class="counter-row"><span>${esc(t("storyText"))}</span><strong id="counter" class="${count >= 80 ? "ready" : ""}">${esc(t("characters", { count }))}</strong></div>`);
        } else if (current === 7) {
          stepShell(kicker, t("emailTitle"), t("emailText"), `
            <label class="field-label" for="email">${esc(t("emailLabel"))}</label>
            <input id="email" type="email" class="field" data-field="reporterEmail" value="${esc(fields.reporterEmail)}" placeholder="${esc(t("emailPlaceholder"))}" maxlength="320" autocomplete="email">`);
        } else {
          const categoryIndex = categoryValues.indexOf(fields.category);
          const railLabel = rails.find(([value]) => value === fields.rail)?.[1] || fields.rail;
          const channelLabel = channels.find(([value]) => value === fields.saleChannel)?.[1] || fields.saleChannel;
          const rows = [
            [t("reviewCountry"), countryName(fields.country), 0],
            [t("reviewCategory"), t("categories")[categoryIndex] || fields.categoryDetails, 1],
            [t("reviewItem"), fields.itemOrService, 2],
            [t("reviewPayment"), copy.en[railLabel] ? t(railLabel) : railLabel, 3],
            [t("reviewRecipient"), fields.paymentIdentifier, 4],
            [t("reviewChannel"), copy.en[channelLabel] ? t(channelLabel) : channelLabel, 5],
            [t("reviewStory"), fields.description, 6],
            [t("reviewEmail"), fields.reporterEmail, 7]
          ];
          stepShell(kicker, t("reviewTitle"), t("reviewText"), `
            <div class="review-grid">${rows.map(([label, value, step]) => `
              <div class="review-item">
                <div><div class="review-label">${esc(label)}</div><div class="review-value">${esc(value)}</div></div>
                <button type="button" class="edit" data-edit="${step}">${esc(t("edit"))}</button>
              </div>`).join("")}</div>`, { final: true });
          document.querySelectorAll("[data-edit]").forEach((button) => {
            button.addEventListener("click", () => { current = Number(button.dataset.edit); saveDraft(); render(); });
          });
        }
      }

      function countryName(code) {
        if (code === "OTHER") return t("other");
        try { return new Intl.DisplayNames([locale, "en"], { type: "region" }).of(code) || code; }
        catch (_) { return code; }
      }

      function bindInputs() {
        document.querySelectorAll("[data-field]").forEach((input) => {
          input.addEventListener("input", () => {
            fields[input.dataset.field] = input.value;
            saveDraft();
            if (input.dataset.field === "description") {
              const counter = document.getElementById("counter");
              const count = input.value.trim().length;
              if (counter) {
                counter.textContent = t("characters", { count });
                counter.classList.toggle("ready", count >= 80);
              }
            }
          });
          input.addEventListener("change", () => {
            fields[input.dataset.field] = input.value;
            saveDraft();
            if (["rail"].includes(input.dataset.field)) render();
          });
        });
        document.querySelectorAll("[data-choice]").forEach((button) => {
          button.addEventListener("click", () => {
            if (current === 1) fields.category = button.dataset.choice;
            if (current === 5) fields.saleChannel = button.dataset.choice;
            saveDraft();
            render();
          });
        });
        screen.querySelector("input, select, textarea")?.focus({ preventScroll: true });
      }

      function validate() {
        if (current === 0 && !fields.country) return t("required");
        if (current === 1 && (!fields.category || (fields.category === "other" && fields.categoryDetails.trim().length < 3))) return t("required");
        if (current === 2 && fields.itemOrService.trim().length < 3) return t("required");
        if (current === 3 && (!fields.rail || (fields.rail === "other" && fields.paymentMethodDetails.trim().length < 3))) return t("required");
        if (current === 4 && fields.paymentIdentifier.trim().length < 3) return t("required");
        if (current === 5 && (!fields.saleChannel || (fields.saleChannel === "other" && fields.saleChannelDetails.trim().length < 3))) return t("required");
        if (current === 6 && fields.description.trim().length < 80) return t("storyError");
        if (current === 7 && !/^\S+@\S+\.\S+$/.test(fields.reporterEmail.trim())) return t("emailError");
        return "";
      }

      function go(direction) {
        if (direction > 0) {
          const error = validate();
          if (error) {
            const element = document.getElementById("error");
            if (element) element.textContent = error;
            return;
          }
        }
        current = Math.min(Math.max(current + direction, 0), TOTAL_STEPS - 1);
        saveDraft();
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function encodePayload(payload) {
        const bytes = new TextEncoder().encode(JSON.stringify(payload));
        let binary = "";
        bytes.forEach((byte) => { binary += String.fromCharCode(byte); });
        return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
      }

      function finish() {
        const button = document.getElementById("next");
        if (button) {
          button.disabled = true;
          button.textContent = t("redirecting");
        }
        const encoded = encodePayload({ v: 1, fields });
        const basePath = locale === "en" ? "" : `/${locale}`;
        const query = new URLSearchParams({
          mode: "report",
          quick: "1",
          category: fields.category,
          channel: fields.saleChannel,
          language: fields.communityLanguage
        });
        localStorage.removeItem(STORAGE_KEY);
        window.location.assign(`${LEDGERHOUND_ORIGIN}${basePath}/payment-safety?${query.toString()}#intake=${encoded}`);
      }

      function intro(hasDraft) {
        updateChrome();
        progressLabel.textContent = t("privateDraft");
        trail.innerHTML = Array.from({ length: TOTAL_STEPS }, (_, index) => `<span class="trail-step ${index === 0 ? "current" : ""}"></span>`).join("");
        screen.innerHTML = `
          <p class="step-kicker">${esc(t("caseLabel"))}</p>
          <h1>${esc(t("introTitle"))}</h1>
          <p class="lead">${esc(t("introText"))}</p>
          ${hasDraft ? `<div class="resume-box"><strong>${esc(t("resumeTitle"))}</strong><span>${esc(t("resumeText"))}</span>
            <div class="resume-actions"><button class="button button-primary" id="resume">${esc(t("resume"))}</button>
            <button class="button button-secondary" id="restart">${esc(t("restart"))}</button></div></div>` : ""}
          <div class="answer"></div>
          <div class="actions"><span></span><button class="button button-primary" id="start">${esc(t("start"))}</button></div>
          <div class="status-note"><span class="status-mark">✓</span><span>${esc(t("privacy"))}</span></div>`;
        document.getElementById("start")?.addEventListener("click", () => { if (!hasDraft) clearDraft(); render(); });
        document.getElementById("resume")?.addEventListener("click", render);
        document.getElementById("restart")?.addEventListener("click", () => { clearDraft(); render(); });
      }

      languageSelect.addEventListener("change", () => {
        locale = languageSelect.value;
        fields.communityLanguage = localeToCommunityLanguage[locale];
        saveDraft();
        intro(Boolean(localStorage.getItem(STORAGE_KEY)));
      });

      const hasDraft = loadDraft();
      languageSelect.value = locale;
      intro(hasDraft);
    })();
  </script>
</body>
</html>
